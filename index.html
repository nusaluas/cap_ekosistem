<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Link Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(17, 24, 39, 0.8), rgba(17, 24, 39, 0.8)), url('https://awsimages.detik.net.id/visual/2025/11/06/topeng-pemakaman-emas-firaun-mesir-tutankhamun-dipamerkan-pada-hari-pertama-untuk-pengunjung-setelah-pembukaan-resmi-museum-be-1762411385683_169.jpeg?w=650&q=90');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .preview-frame { width: 100%; height: 200px; border: none; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-white">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-bold mb-2">NUSA LUAS ECOSYSTEM</h1>
            <p class="text-gray-300">Save and preview your favorite websites.</p>
        </header>

        <!-- Form -->
        <div class="bg-gray-900/80 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-gray-700 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="title" placeholder="Site Title..." class="bg-gray-800 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-700">
                <input type="url" id="url" placeholder="https://..." class="bg-gray-800 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-700">
                <button onclick="addLink()" class="bg-indigo-600 p-3 rounded-xl font-bold hover:bg-indigo-500 transition">Add Link</button>
            </div>
        </div>

        <!-- Grid -->
        <div id="linkGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>

    <script>
        // URL Web App dari Google Apps Script
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZyNP8eqXnlQ48PPRkP5oGPPGnfJAywytBmv1sEQbpu7jw0nSJK1lsUWFSwBzXS1w/exec";
        
        let links = JSON.parse(localStorage.getItem('myLinks')) || [];

        function renderLinks() {
            const grid = document.getElementById('linkGrid');
            grid.innerHTML = '';
            links.forEach((link) => {
                grid.innerHTML += `
                    <div class="bg-gray-900/80 backdrop-blur-sm rounded-3xl overflow-hidden border border-gray-700 shadow-[0_0_15px_rgba(255,255,255,0.1)] hover:shadow-[0_0_25px_rgba(255,255,255,0.2)] transition-all duration-300">
                        <div class="w-full h-40 bg-gray-800 flex items-center justify-center overflow-hidden">
                            <iframe src="${link.url}" class="preview-frame" title="Preview"></iframe>
                        </div>
                        <div class="p-5">
                            <h3 class="font-bold text-xl truncate">${link.title}</h3>
                            <a href="${link.url}" target="_blank" class="text-indigo-400 text-sm hover:underline truncate block">Visit Site</a>
                        </div>
                    </div>
                `;
            });
        }

        async function addLink() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            
            if (title && url) {
                const newLink = { title, url };
                
                // Simpan lokal
                links.push(newLink);
                localStorage.setItem('myLinks', JSON.stringify(links));
                renderLinks();
                
                // Kirim ke Spreadsheet
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(newLink)
                    });
                } catch (error) {
                    console.error("Gagal mengirim ke Spreadsheet", error);
                }

                document.getElementById('title').value = '';
                document.getElementById('url').value = '';
            }
        }

        renderLinks();
    </script>
</body>
</html>
